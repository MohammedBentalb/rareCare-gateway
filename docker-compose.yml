services:
    rarecare:
        build:
            context: .
            dockerfile: ./docker/php/dockerfile
        container_name: rarecare_container
        volumes:
            - ./:/var/www/html
        environment:
            - POSTGRES_USER=${USER}
            - POSTGRES_DB=${DATABASE}
            - POSTGRES_PASSWORD=${PASSWORD}
            - POSTGRES_PORT=${PORT}
            - DATABASE_URL=postgresql://${USER}:${PASSWORD}@${HOST}:5432/${DATABASE}?serverVersion=16&charset=utf8
            - SERVICES_APIS={"patients":"http://host.docker.internal:8081/api/v1/patients","auth":"http://rarecare:8000"}
            - MESSENGER_TRANSPORT_DSN=amqp://guest:guest@rabbit:5672/%2f
        depends_on:
            - rarecare_db

    nginx:
        image: nginx:alpine
        container_name: nginx_container
        ports:
            - "8080:80"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - rarecare
    notification_service:
        build:
            context: ../notification-service
            dockerfile: ./docker/php/Dockerfile
        container_name: notification_service_container
        volumes:
            - ../notification-service/:/var/www/html
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
            - DB_CONNECTION=sqlite
        depends_on:
            - rarecare_db

    notification_nginx:
        image: nginx:alpine
        container_name: notification_nginx_container
        ports:
            - "8081:80"
        volumes:
            - ../notification-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - notification_service

    rarecare_db:
        image: postgres:16
        container_name: rarecare_db_container
        environment:
            - POSTGRES_USER=${USER}
            - POSTGRES_DB=${DATABASE}
            - POSTGRES_PASSWORD=${PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - rarecare_data:/var/lib/postgresql/data

    rabbit:
        image: rabbitmq:3-management
        container_name: rabbitmq
        hostname: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        restart: unless-stopped

volumes:
    rarecare_data:
