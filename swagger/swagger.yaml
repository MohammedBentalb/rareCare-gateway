openapi: 3.0.0
info:
    title: Rare Management API
    description: API documentation for the Rare Management system using a static YAML approach.
    version: 1.0.0
servers:
    - url: http://localhost:8080/api/v1
      description: Gateway Server

paths:
    /login:
        post:
            tags:
                - Auth
            summary: User login
            operationId: api_login
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                username:
                                    type: string
                                    example: user@example.com
                                password:
                                    type: string
                                    example: password123
            responses:
                "200":
                    description: Returns the JWT token
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                "401":
                    description: Invalid credentials
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /register:
        post:
            tags:
                - Auth
            summary: User registration
            operationId: api_register
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/RegisterDTO"
            responses:
                "201":
                    description: User registered successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    user:
                                        $ref: "#/components/schemas/User"
                                    token:
                                        type: string
                "400":
                    description: Validation failed (Invalid input)
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ValidationError"

    /refresh:
        post:
            tags:
                - Auth
            summary: Refresh JWT token
            description: "Refreshes the Access Token using the REFRESH_TOKEN cookie."
            operationId: api_refresh
            responses:
                "200":
                    description: Returns new JWT token
                    headers:
                        Set-Cookie:
                            schema:
                                type: string
                                example: REFRESH_TOKEN=...; HttpOnly; Path=/; SameSite=Lax
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                                    message:
                                        type: string
                                        example: Token refreshed successfully
                "401":
                    description: Refresh token missing or invalid
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "400":
                    description: Invalid token type
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /{service}/{path}:
        get:
            tags:
                - Proxy
            summary: Proxied GET request
            parameters:
                - name: service
                  in: path
                  required: true
                  description: Target microservice name
                  schema:
                      type: string
                - name: path
                  in: path
                  required: false
                  description: Target path within the microservice
                  schema:
                      type: string
                      default: ""
            responses:
                "200":
                    description: Proxied response from the microservice
        post:
            tags:
                - Proxy
            summary: Proxied POST request
            parameters:
                - name: service
                  in: path
                  required: true
                  description: Target microservice name
                  schema:
                      type: string
                - name: path
                  in: path
                  required: false
                  description: Target path within the microservice
                  schema:
                      type: string
                      default: ""
            responses:
                "200":
                    description: Proxied response from the microservice

components:
    schemas:
        RegisterDTO:
            type: object
            required:
                - name
                - email
                - password
            properties:
                name:
                    type: string
                    description: Full name of the user
                    example: John Doe
                email:
                    type: string
                    description: Email address of the user
                    example: john.doe@example.com
                password:
                    type: string
                    description: Password (min 8 characters)
                    example: password123
        User:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                email:
                    type: string
                    description: Email address
                name:
                    type: string
                    description: Full name
        ValidationError:
            type: object
            properties:
                type:
                    type: string
                    example: https://symfony.com/errors/validation
                title:
                    type: string
                    example: Validation Failed
                status:
                    type: integer
                    example: 400
                detail:
                    type: string
                    example: "email: This email is already used"
                violations:
                    type: array
                    items:
                        type: object
                        properties:
                            propertyPath:
                                type: string
                            title:
                                type: string
                            template:
                                type: string
                            parameters:
                                type: object
        Error:
            type: object
            properties:
                error:
                    type: string
                    example: "Invalid credentials"
                message:
                    type: string
                    example: "An error occurred"
    securitySchemes:
        Bearer:
            type: http
            scheme: bearer
            bearerFormat: JWT
security:
    - Bearer: []
